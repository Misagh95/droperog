name: Scan Airdrops

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run scanner
        run: npm run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save state
        run: |
          git config user.name "droperog-bot"
          git config user.email "bot@droperog.dev"
          git add data/state.json docs/data/projects.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "📊 Update scan state [skip ci]"
          git pull --rebase origin main
          git push
